workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.16.9
      java: 17

    scripts:
      - name: Clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
