workflows:
  android-debug:
    name: SatarkOne Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - firebase
    scripts:
      - name: Inject google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode \
            > android/app/google-services.json
      - name: flutter pub get
        script: flutter pub get
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  android-release:
    name: SatarkOne Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - firebase
    scripts:
      - name: Inject google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode \
            > android/app/google-services.json
      - name: flutter pub get
        script: flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true
